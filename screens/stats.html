<!-- STATISTIK -->
<section id="view-stats" class="view">
    <div class="view-header">
        <h2>Statistik</h2>
        <p class="subtitle">Analisis Performa</p>
    </div>
    <div class="stats-overview">
        <div class="stat-card">
            <span class="stat-value" id="statTotalAttempts">0</span>
            <span class="stat-label">Sesi</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="statBestScore">—</span>
            <span class="stat-label">Terbaik</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="statAvgScore">—</span>
            <span class="stat-label">Rata-rata</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="statMastered">0</span>
            <span class="stat-label">Mastered</span>
        </div>
    </div>
    <h3>Insight Belajar</h3>
    <div id="habitInsights" class="habit-insights"></div>
    <h3>Detail Per Soal</h3>
    <div id="perQuestionStats" class="per-question-stats"></div>
</section>
