<!-- MODAL IMPORT -->
<div id="importModal" class="modal">
    <div class="modal-overlay" onclick="App.closeModal('importModal')"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3>Import Soal</h3><button class="btn-close" onclick="App.closeModal('importModal')">×</button>
        </div>
        <div class="import-container">
            <div class="import-tabs">
                <button class="tab-btn active" data-tab="paste" onclick="App.switchImportTab('paste')">Paste</button>
                <button class="tab-btn" data-tab="json" onclick="App.switchImportTab('json')">JSON</button>
                <button class="tab-btn" data-tab="image" onclick="App.switchImportTab('image')">Gambar</button>
                <button class="tab-btn" data-tab="pdf" onclick="App.switchImportTab('pdf')">PDF</button>
            </div>
            <div id="tab-paste" class="tab-content active">
                <textarea id="pasteInput" rows="10" placeholder="Format: 1. Soal... A. Opsi... Jawaban: A"></textarea>
                <button class="btn btn-primary" style="width:100%; margin-top:20px;"
                    onclick="App.parseAndImport()">Proses Import</button>
            </div>
            <div id="tab-json" class="tab-content">
                <div class="upload-zone" onclick="document.getElementById('jsonInput').click()">
                    <input type="file" id="jsonInput" hidden onchange="App.handleJSONFile(event)">
                    <h4>Klik untuk Upload JSON</h4>
                </div>
                <textarea id="jsonInputText" rows="5" style="margin-top:16px;"
                    placeholder="Atau paste JSON di sini..."></textarea>
                <button class="btn btn-primary" style="width:100%; margin-top:16px;"
                    onclick="App.importJSONBulk()">Import JSON</button>
            </div>
            <div id="tab-image" class="tab-content">
                <div class="upload-zone" onclick="document.getElementById('ocrImageInput').click()">
                    <input type="file" id="ocrImageInput" hidden multiple onchange="App.handleOCRImage(event)">
                    <h4>Klik untuk Upload Gambar</h4>
                </div>
                <div id="ocrImageProgress" class="ocr-progress hidden" style="margin-top:16px;">
                    <div class="progress-bar">
                        <div id="ocrImageFill" class="progress-fill" style="width:0%"></div>
                    </div>
                    <span id="ocrImageStatus" style="font-size:0.75rem; font-weight:700;"></span>
                </div>
                <div id="ocrImageResult" class="hidden" style="margin-top:16px;">
                    <textarea id="ocrImageText" rows="8"></textarea>
                    <button class="btn btn-primary" style="width:100%; margin-top:12px;"
                        onclick="App.importOCRResult('ocrImageText')">Import Hasil OCR</button>
                </div>
            </div>
            <div id="tab-pdf" class="tab-content">
                <div class="upload-zone" onclick="document.getElementById('ocrPdfInput').click()">
                    <input type="file" id="ocrPdfInput" hidden onchange="App.handleOCRPdf(event)">
                    <h4>Klik untuk Upload PDF</h4>
                </div>
                <div id="ocrPdfProgress" class="ocr-progress hidden" style="margin-top:16px;">
                    <div class="progress-bar">
                        <div id="ocrPdfFill" class="progress-fill" style="width:0%"></div>
                    </div>
                    <span id="ocrPdfStatus" style="font-size:0.75rem; font-weight:700;"></span>
                </div>
                <div id="ocrPdfResult" class="hidden" style="margin-top:16px;">
                    <textarea id="ocrPdfText" rows="8"></textarea>
                    <button class="btn btn-primary" style="width:100%; margin-top:12px;"
                        onclick="App.importOCRResult('ocrPdfText')">Import Hasil PDF</button>
                </div>
            </div>
        </div>
    </div>
</div>
